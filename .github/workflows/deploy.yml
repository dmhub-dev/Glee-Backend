name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Run lint workflow
    uses: ./.github/workflows/lint.yml

  test:
    name: Run test workflow
    needs: lint
    uses: ./.github/workflows/test.yml

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    environment: production

    env:
      VPS_POST_DEPLOY_COMMAND: ${{ secrets.VPS_POST_DEPLOY_COMMAND }}

    steps:
      - name: Check deployment secrets
        id: deploy_config
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_PATH: ${{ secrets.VPS_APP_PATH }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          APP_PATH="${VPS_APP_PATH:-$VPS_DEPLOY_PATH}"
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ] || [ -z "$APP_PATH" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing VPS deployment secrets. Skipping deploy."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          SSH_HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          SSH_PORT="$(printf '%s' "${VPS_PORT:-22}" | tr -d '[:space:]')"
          ssh-keyscan -T 30 -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts || true

      - name: Rebuild backend container
        if: steps.deploy_config.outputs.ready == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_PATH: ${{ steps.deploy_config.outputs.app_path }}
        run: |
          SSH_HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          SSH_PORT="$(printf '%s' "${VPS_PORT:-22}" | tr -d '[:space:]')"
          timeout 20 bash -c "</dev/tcp/$SSH_HOST/$SSH_PORT"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -p "$SSH_PORT" "$VPS_USER@$SSH_HOST" \
            "cd '$VPS_APP_PATH' && git pull --ff-only && docker compose --env-file .env up -d --build"

      - name: Run post-deploy command
        if: steps.deploy_config.outputs.ready == 'true' && env.VPS_POST_DEPLOY_COMMAND != ''
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_HOST="$(printf '%s' "$VPS_HOST" | tr -d '[:space:]')"
          SSH_PORT="$(printf '%s' "${VPS_PORT:-22}" | tr -d '[:space:]')"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -p "$SSH_PORT" "$VPS_USER@$SSH_HOST" \
            "$VPS_POST_DEPLOY_COMMAND"
