version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: glee
      POSTGRES_USER: glee
      POSTGRES_PASSWORD: glee
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
